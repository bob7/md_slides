<!DOCTYPE html>
<html>
<head><title>Program</title>
<style>
	html, body {margin: 0; height: 100%; margin: 1rem; overflow: hidden; background:#888; 
		transform: scale(0.95);  transform-origin: 0 0;
}

	  
/*body {
	margin: 0; padding: 20px; height: 60vh;
	width:95%;
	background:#888;}
*/.buttons { text-align: center; margin-bottom: 20px; }
button { margin: 0 5px; }
.rectangle-container { width: 100%; height: 40px; background: #F5F5F5; margin-bottom: 0px; }
.outputs-container { display: flex; justify-content: center; gap: 20px; height: calc(100vh - 220px); margin-top: 20px; }
.header { text-align: center; margin-bottom: 10px; font-weight: bold; }
.output-frame { border: 1px solid #ccc; padding: 10px; overflow-y: auto; height: 100%; text-align: left; line-height: 1.5; }
#output1, #output3 { width: 120px; }
#output2 { width: 500px; }
.pie-container { width: 120px; height: 100%; display: flex; flex-direction: column; align-items: center; padding: 10px; }
#pieChart { width: 110px !important; height: 110px !important; }
.rectangle-container canvas { width: 100%; height: 100%; }
</style>
</head>
<body>
<div class="buttons">
<button onclick="run(1)">1</button><button onclick="run(2)">2</button><button onclick="run(3)">3</button><button onclick="run(4)">4</button><button onclick="run(5)">5</button><button onclick="run(6)">6</button><button onclick="run(7)">7</button><button onclick="run(8)">8</button><button onclick="run(9)">9</button><button onclick="run(10)">10</button>
<button onclick="run(11)">11</button><button onclick="run(12)">12</button><button onclick="run(13)">13</button><button onclick="run(14)">14</button><button onclick="run(15)">15</button><button onclick="run(16)">16</button><button onclick="run(17)">17</button><button onclick="run(18)">18</button><button onclick="run(19)">19</button><button onclick="run(20)">20</button>
</div>
<div class="rectangle-container"><canvas id="rectangleCanvas"></canvas></div>
<div class="outputs-container">
<div>
<div class="header">Output</div>
<div class="output-frame" id="output1"></div>
</div>
<div>
<div class="header">Remaining</div>
<div class="output-frame" id="output2"></div>
</div>
<div>
<div class="header">Trace</div>
<div class="output-frame" id="output3"></div>
</div>
<div>
<div class="header">Space</div>
<div class="output-frame pie-container">
<canvas id="pieChart" width="110" height="110"></canvas>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
let F = new Set();
let trace = "";
let output1 = [];
let output2 = [];
let output3 = [];
let pieChart = null;
let latestSpace = 0;
const canvas = document.getElementById('rectangleCanvas');
const ctx = canvas.getContext('2d');
let segmentColors = {};

function getRandomColor() {
    const r = Math.floor(Math.random() * 256);
    const g = Math.floor(Math.random() * 256);
    const b = Math.floor(Math.random() * 256);
    return `rgb(${r},${g},${b})`;
}

function redrawRectangle() {
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
    ctx.fillStyle = '#F5F5F5';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    for (let str of output1) {
        if (!/^[01]+$/.test(str)) continue;
        const len = str.length;
        const numSegments = Math.pow(2, len);
        const segmentWidth = canvas.width / numSegments;
        const index = parseInt(str, 2);
        const left = index * segmentWidth;
        ctx.fillStyle = segmentColors[str] || getRandomColor();
        segmentColors[str] = ctx.fillStyle;
        ctx.fillRect(left, 0, segmentWidth, canvas.height);
    }
}

window.addEventListener('resize', redrawRectangle);

function updateF(F, position, requiredLen) {
    for (let s of F) {
        if (s.length > position && s[position] === '1') {
            let ss = s;
            F.delete(s);
            if (ss.length < requiredLen) {
                let num1 = requiredLen - ss.length;
                for (let i = 0; i < num1; i++) {
                    ss += "0";
                }
                output1.push(ss);
                document.getElementById('output1').innerHTML = output1.join('<br>');
                redrawRectangle();
                for (let i = 0; i < num1; i++) {
                    let tt = "";
                    let sss = ss;
                    for (let j = 0; j < i; j++) {
                        tt += "0";
                    }
                    sss = sss + tt + "1";
                    F.add(sss);
                }
            } else {
                output1.push(s);
                document.getElementById('output1').innerHTML = output1.join('<br>');
                redrawRectangle();
            }
            break;
        }
    }
    return F;
}

function join(sortedF) {
    let arr = Array.from(sortedF).sort();
    return arr.join(", ");
}

function calculateSpace(trace) {
    let value = 0;
    for (let i = 0; i < trace.length; i++) {
        if (trace[i] === '1') {
            value += 1 / Math.pow(2, i + 1);
        }
    }
    return value;
}

function updatePieChart(spaceValue) {
    const ctxPie = document.getElementById('pieChart').getContext('2d');
    const filled = 1 - spaceValue;
    
    if (pieChart) {
        pieChart.destroy();
    }
    
    pieChart = new Chart(ctxPie, {
        type: 'pie',
        data: {
            datasets: [{
                data: [filled, spaceValue],
                backgroundColor: ['#757575', '#1976D2']
            }]
        },
        options: {
            responsive: false,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false }
            }
        }
    });
}

function init(n) {
    F = new Set();
    trace = "";
    output1 = [];
    output2 = [];
    output3 = [];
    segmentColors = {};
    for (let num = 0; num < n; num++) {
        trace += "1";
        let temp = "";
        for (let num2 = 0; num2 < num; num2++) {
            temp += "0";
        }
        temp += "1";
        F.add(temp);
    }
    let output = "";
    for (let num = 0; num < n; num++) {
        output += "0";
    }
    output1.push(output);
    output2.push(join(F));
    output3.push(trace);
    latestSpace = calculateSpace(trace);
    document.getElementById('output1').innerHTML = output1.join('<br>');
    redrawRectangle();
    document.getElementById('output2').innerHTML = output2.join('<br>');
    document.getElementById('output3').innerHTML = output3.join('<br>');
    updatePieChart(latestSpace);
}

function run(i) {
    if (output1.length === 0) {
        init(i);
        return;
    }
    let inputs = i.toString();
    if (inputs.length === 0) {
        output1.push("the input is illegal here");
        document.getElementById('output1').innerHTML = output1.join('<br>');
        redrawRectangle();
        return;
    }
    let num = trace.length - i;
    if (num < 0) {
        num = -num;
        for (let x = 0; x < num; x++) {
            trace += "0";
        }
    }
    let position = i - 1;
    while (position >= 0 && trace[position] !== '1') {
        position--;
    }
    if (position === -1) {
        output1.push("the input is illegal here also");
        document.getElementById('output1').innerHTML = output1.join('<br>');
        redrawRectangle();
        return;
    }
    F = updateF(F, position, i);
    let formerpart = trace.substring(0, position);
    formerpart += "0";
    for (let num = position + 1; num < i; num++) {
        formerpart += "1";
    }
    let rearPart = trace.length === i ? "" : trace.substring(i);
    trace = formerpart + rearPart;
    
    output2.push(join(F));
    output3.push(trace);
    latestSpace = calculateSpace(trace);
    document.getElementById('output2').innerHTML = output2.join('<br>');
    document.getElementById('output3').innerHTML = output3.join('<br>');
    updatePieChart(latestSpace);
}
</script>
</body>
</html>
