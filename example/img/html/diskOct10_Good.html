                const root = d3.hierarchy(data)
                    .sum(d => d.size)
                    .sort((a, b) => b.value - a.value);

                    .size([2 * Math.PI, root.height + 1])
                    (root);

	function construct_luoji(depth) {
	    cache[0][0].depth = 0;  // assuming cache[0][0] is root
	    let count = 1; let id = 1;
	    for (let i = 0; i < depth - 1; i++) {cache[i + 1] = [];
	        for (let c of cache[i]) {let newDepth = c.depth + 1;
	            let c1 = {
	                label: count++ + '',
	                id: id++ + "",
	                children: [],
	                depth: newDepth,
	                isLeaf: i === depth - 2,
	                p: c,
	                normal: true,
	                red_end: false,
	                red_process: false,
	                blue: false,
	                predictcolor: false,
	                value: Math.pow(2, depth - 1),
	                preCor: "normal",
	                curCor: "normal",
					load: 1
	            };
	            let c2 = {
	                label: count++ + '',
	                id: id++ + "",
	                children: [],
	                depth: newDepth,
	                isLeaf: i === depth - 2,
	                p: c,
	                normal: true,
	                red_end: false,
	                red_process: false,
	                blue: false,
	                predictcolor: false,
	                value: Math.pow(2, depth - 1),
	                preCor: "normal",
	                curCor: "normal",
					load: 1
	            };
	            if (i === depth - 2) {c1.size = 1; c2.size = 1; c1.label = (count - 2) + ''; c2.label = (count - 1) + '';}
					c.children = [c1, c2]; cache[i + 1].push(c1, c2);
	        }
	    }
	}

	function minLeafLoad(i) {
	    let node = findNodeTo2(tree, i + "");
	    if (!node) return Infinity; // Invalid node
		let redCellValue = maxLabelSetSize;
	    // Case (a): Leaf node
	    if (node.isLeaf) {
	        if (node.red_process || node.red_end) {return redCellValue;}
	        let labelSize = node.label ? node.label.split("/").length : 0;
	        return labelSize;
	    }
	    // Case (b): Non-leaf node
	    let leafDescendants = [];
	    function collectLeaves(n) {
	        if (n.isLeaf) {leafDescendants.push(n);} 
			else {n.children.forEach(child => collectLeaves(child));}
	    }
	    collectLeaves(node);
	    if (leafDescendants.length === 0) return Infinity; // No leaf descendants
	    return Math.min(...leafDescendants.map(d => minLeafLoad(parseInt(d.id))));
	}
	
	function computePivotAndScore(j, d) {
	    let node = findNodeTo2(tree, d + ""); let currentLabel = parseInt(j);
	    let pivotLevel = 0; let pivotLabel = "0"; let maxScore = 0;
	    let level = depth - 1; let pathNodes = [];
	    // Collect path from d to root
	    while (node && level >= 0) {
	    pathNodes.push({ node, level, id: node.id }); node = node.p; level--;}
	    pathNodes.reverse(); // Root to d
	    // Compute ancestor arrays
	    let jAncestors = []; let jLabel = currentLabel;
	    for (let l = depth - 1; l >= 0; l--) {
	        jAncestors.push(jLabel); jLabel = (jLabel % 2 === 0) ? (jLabel - 2) / 2 : (jLabel - 1) / 2;}
	    jAncestors.reverse(); // Root to leaf
	    let dAncestors = []; node = findNodeTo2(tree, d + "");
	    let dLabels = node.label ? node.label.split("/") : [node.id];
	    dAncestors.push(dLabels[0]);
	    while (node.p) {node = node.p;
	        dLabels = node.label ? node.label.split("/") : [node.id];
	        dAncestors.push(dLabels[0] || node.id);}
	    dAncestors.reverse(); // Root to leaf
	    // Find pivot: deepest node where L(t) contains j's ancestor
	    for (let i = 0; i < Math.min(dAncestors.length, jAncestors.length); i++) {
	        let node = pathNodes[i].node; let level = pathNodes[i].level;
	        let labels = node.label ? node.label.split("/") : [dAncestors[i]];
	        if (labels.includes(jAncestors[i] + "")) {pivotLevel = level; pivotLabel = dAncestors[i];} 
			else {break;}}
	    // Compute score: max |L(t)| from pivot (exclusive) to d (inclusive)
	    let foundNode = false;
	    for (let { node, level, id } of pathNodes) {
	        if (level > pivotLevel || (level === pivotLevel && id === d + "")) {
	            foundNode = true; let labels = node.label ? node.label.split("/") : [];
	            let size = labels.length || 1; if (size > maxScore) maxScore = size;}}
	    if (!foundNode) maxScore = 1;
	    // Compute pivot size for tiebreaker
	    let pivotSize = 0; let pivotNode = pathNodes.find(p => p.level === pivotLevel)?.node;
	    pivotSize = pivotNode && pivotNode.label ? pivotNode.label.split("/").length : 0;
	    return [pivotLevel, maxScore, pivotSize, pivotLabel];
	}



	function computeP(x, y_id) {
	    let node = findNodeTo2(tree, y_id + "");
	    let currentX = parseInt(x);
	    let level = depth - 1;
	    let minLevel = Infinity;
	    let resultNode = null;
	    while (node && level > 0) {
	        let labels = node.label ? node.label.split("/").map(Number) : [];
	        let xAncestor = currentX;
	        for (let l = depth - 1; l > level; l--) {
	            xAncestor = (xAncestor % 2 === 0) ? (xAncestor - 2) / 2 : (xAncestor - 1) / 2;
	        }
	        let size = labels.length || 0;
	        let isValid = !labels.includes(xAncestor) && !labels.includes(currentX) && size < 3;
	        if (isValid) {
	            let parent = node.p;
	            let parentLevel = level - 1;
	            if (parentLevel > 1) {
	                let parentLabels = parent.label ? parent.label.split("/").map(Number) : [];
	                let parentSize = parentLabels.length || 0;
	                let parentXAncestor = currentX;
	                for (let l = depth - 1; l > parentLevel; l--) {
	                    parentXAncestor = (parentXAncestor % 2 === 0) ? (parentXAncestor - 2) / 2 : (parentXAncestor - 1) / 2;
	                }
	                if (parentSize > size && parentLabels.includes(parentXAncestor)) {
	                    minLevel = level;
	                    resultNode = node;
	                    break;
	                }
	            } else if (parentLevel === 1) {
	                minLevel = level;
	                resultNode = node;
	                break;
	            }
	        }
	        node = node.p;
	        level--;
	    }
	    return { node: resultNode, level: minLevel === Infinity ? -1 : minLevel };
	}

	async function onrclick_auto_global() {

	        for (let idx = 0; idx < length; idx++) {
	            let j = parseInt(tmp_redNowLabels[idx]);
	            tmpLayer = 0;
	            // Compute E(x): leaf nodes minimizing |L(P(x, t))|
	            let minLabelSize = Infinity;
	            let candidatesE = [];
	            for (let i = beginLabel; i <= endLabel; i++) {
	                let node = findNodeTo2(tree, i + "");
	                if (node.red_process || node.red_end || !node.isLeaf) continue;
	                let p = computeP(j, i);
	                if (p.node) {
	                    let labelSize = p.node.label ? p.node.label.split("/").length : 0;
	                    if (labelSize < minLabelSize) {
	                        minLabelSize = labelSize;
	                        candidatesE = [i];
	                    } else if (labelSize === minLabelSize) {
	                        candidatesE.push(i);
	                    }
	                }
	            }
	            if (candidatesE.length === 0) {
	                alert("The coder loses");
	                gameOv = true;
	                return;
	            }
	            // Compute M(x): nodes in E(x) minimizing |P(x, k)|
	            let minLevel = Infinity;
	            let candidatesM = [];
	            for (let i of candidatesE) {
	                let p = computeP(j, i);
	                if (p.level > 0 && p.level < minLevel) {
	                    minLevel = p.level;
	                    candidatesM = [i];
	                } else if (p.level === minLevel) {
	                    candidatesM.push(i);
	                }
	            }
	            if (candidatesM.length === 0) {
	                alert("The coder loses");
	                gameOv = true;
	                return;
	            }
	            // Compute D(x): nodes in M(x) minimizing |L(i)|
	            let minDLabelSize = Infinity;
	            let candidatesD = [];
	            for (let i of candidatesM) {
	                let node = findNodeTo2(tree, i + "");
	                let labelSize = node.label ? node.label.split("/").length : 0;
	                if (labelSize < minDLabelSize) {
	                    minDLabelSize = labelSize;
	                    candidatesD = [i];
	                } else if (labelSize === minDLabelSize) {
	                    candidatesD.push(i);
	                }
	            }
	            if (candidatesD.length === 0) {
	                alert("The coder loses");
	                gameOv = true;
	                return;
	            }
	            let target = Math.min(...candidatesD);
	            single.handle(target + "", tmp_redNowLabels[idx]);
	            Recording.push("b:id:" + target + ":" + tmpLayer);
	            blueSelectLabel.push(1);
	            console.log("Moving label", parseInt(j).toString(bvar), "to target:", parseInt(target).toString(bvar));
	        }
	        let leafNode = findNodeTo2(tree, redNowLabel_id);
	        if (leafNode && leafNode.isLeaf && (leafNode.red_process || leafNode.red_end)) {
	            console.log("Calling updateLabelWeight for leaf", redNowLabel_id.toString(bvar), "label-set:", leafNode.label);
	            updateLabelWeight(leafNode);
	        }
	        console.log("labelWeight for all nodes:");
	        for (let j = 0; j <= endLabel; j++) {
	            console.log({
	                label: parseInt(j).toString(bvar),
	                weight: labelWeight[parseInt(j)]
	            });
	        }
	        let propF = hitNum / (beginLabel + 1) * 100;
	        let propR = "Hits " + propF.toFixed(0) + "%";
	        let maxLabv = `Load ${maxLabelSetSize}`;
	        interVar = pivInter();
	        pivGroupTemp = pivGroupMaximal();
	        displayPairs([propR, maxLabv], interArr);
	        findNodeTo2(tree, redNowLabel_id, node => {node.red_end = true; node.red_process = false;});
	        blueSelectLabel = [];
	        next = 'red';
	        redNowLabel = "";
	        FLAGPlayer = 0;
	        tmpLayer = 0;

	function pivGroupMaximal() {//get maximal/minimal pivots
	    let pivGroupNodes = pivGroupMulti();
	    let result = [];
	    // Helper function to check if i is an ancestor of j
	    function isAncestor(i, j) {
	        if (i === j) return false;
	        let node = findNodeTo2(tree, j + "");
	        while (node && node.p) {
	            node = node.p;
	            if (parseInt(node.id) === i) return true;
	        }
	        return false;
	    }
	    // Keep only nodes that have no ancestor in pivGroupNodes
	    for (let k of pivGroupNodes) {
			// if (minpivar){}
	        // let hasAncestor = pivGroupNodes.some(otherK => otherK !== k && isAncestor(otherK, k));
	        let hasPredecessor = pivGroupNodes.some(otherK => otherK !== k && isAncestor(k, otherK));
	        // if (!hasAncestor) {result.push(k);}
	        if (!hasPredecessor) {result.push(k);}
	    }
	    return result;
	}

		function pivGroupMulti() {
		    let result = [];
		    // Iterate over non-leaf nodes (0–6 for depth=5)
		    for (let k = 0; k < Math.pow(2, depth - 1) - 1; k++) {
		        let kNode = findNodeTo2(tree, k + "");
		        if (!kNode || kNode.isLeaf) continue;
		        // Get label-set size for k
		        let kSize = kNode.label ? kNode.label.split("/").length : 0;
		        // Collect leaf descendants
		        let leafDescendants = [];
		        function collectLeaves(n) {
		            if (n.isLeaf) {leafDescendants.push(n);}
					else {n.children.forEach(child => collectLeaves(child));}
		        }
		        collectLeaves(kNode);
		        // Check each leaf i
		        for (let iNode of leafDescendants) {
		            let i = parseInt(iNode.id);
		            // Skip if chosen by Player 1
		            if (iNode.red_process || iNode.red_end) continue;
		            // Get path from k (exclusive) to i (inclusive)
		            let path = [];
		            let current = iNode;
		            while (current && current.id !== k + "") {path.push(current); current = current.p;}
		            if (!current) continue; // i not a descendant of k
		            // Check label-set sizes
		            let valid = true;
		            for (let tNode of path) {
		                let tSize = tNode.label ? tNode.label.split("/").length : 0;
		                if (tSize >= kSize) {valid = false; break;}
		            }
		            // If valid, add k to result and break (one qualifying i is enough)
		            if (valid) {result.push(k); break;}
		        }
		    }
		    return result;
		}

    function findNodeTo2(node, id, handle = () => {}) {
        if (node.id === id) {handle(node); return node;}
        if (node.children.length) {
			return findNodeTo2(node.children[0], id, handle) || findNodeTo2(node.children[1], id, handle);
		}
        return null;
	}

	function updateLabelWeight(leafNode) {
	    if (!leafNode.isLeaf) return;
	    const labels = leafNode.label ? leafNode.label.split("/").map(num => parseInt(num)) : [];
	    const increment = Math.pow(2, -depth); // 2^(-depth)
	    
	    // Update leaf labels
	    for (let i of labels) {
	        labelWeight[i] += increment;
	    }
	    
	    // Update non-leaf nodes recursively
	    function updateNonLeaf(node) {
	        if (node.isLeaf || !node.children) return;
	        let t = node.children[0];
	        let m = node.children[1];
	        let tIndex = parseInt(t.id);
	        let mIndex = parseInt(m.id);
	        updateNonLeaf(t);
	        updateNonLeaf(m);
	        labelWeight[parseInt(node.id)] = labelWeight[tIndex] + labelWeight[mIndex];
	    }
	    
	    updateNonLeaf(tree);
